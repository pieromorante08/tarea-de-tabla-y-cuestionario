<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    
</head>
<body>
    <h4><a href="index.html"><i class="bi bi-chevron-double-left"></i>volver al inicio</a></h4>
    <h1>📄formulario de postulacion</h1>
    <p>puesto: frontend devolver trainee</p>
    <fieldset>
        <legend>Datos Personales</legend>
        <label>Nombre Completo</label><br>
        <input type="text" placeholder="tu nombre aqui"><br>
        <label>correo electronico:</label><br>
        <input type="gmail" placeholder="ejemplo@gmail.com" ><br>
        <label>teléfono</label><br>
        <input type="number" placeholder="+51 325343513">
    </fieldset>

    <fieldset>
        <legend>
            perfil tecnico
        </legend>
        <label>link gibhub</label><br>
        <input type="text" placeholder="https//github.com/usuario"><br>
        <label>nivel basico</label><br>
        <select>
            <option value="basico">basico</option>
            <option value="">intermedio</option>
            <option value="">avanzado</option>
        </select><br>
        <label>tecnologia</label><br>
        <input type="checkbox"> HTML5
        <input type="checkbox"> CSS3
        <input type="checkbox"> JavaScrip
        
    </fieldset>
    <fieldset>
        <legend>
            Documentación
        </legend>
        <label>sube tu CV (PDF):</label><br>
        <input type="file" accept=".PDF"><br><br>
        <label>Mensaje para reclutador:</label><br>
        <textarea rows="6" style="width: 100%;"></textarea>
    </fieldset>
    <button type="submit" style="width: 100%;">🚀 ENVIAR POSTULACIÓN</button>
    
</body>
</html>
